<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamline - Interactive Workflow Builder</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS v3 CDN (Excellent for single-file webapps) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        slate: {
                            850: '#1e293b',
                            750: '#334155'
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- React & ReactDOM UMD -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel standalone to compile JSX in browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons (Browser Script Edition) -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        html, body, #root {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #f8fafc;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            user-select: none;
        }
        /* Webkit scrollbar styles */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 9999px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // Constants and Presets Data
        const Priority = {
            HIGH: 'HIGH',
            MEDIUM: 'MEDIUM',
            LOW: 'LOW',
            INFO: 'INFO'
        };

        const ConnectionStyle = {
            CURVE: 'CURVE',
            STRAIGHT: 'STRAIGHT',
            ORTHOGONAL: 'ORTHOGONAL'
        };

        const COLORS = [
            { id: 'slate', bg: 'bg-slate-50', border: 'border-slate-300', text: 'text-slate-700', raw: '#64748b' },
            { id: 'emerald', bg: 'bg-emerald-50', border: 'border-emerald-300', text: 'text-emerald-700', raw: '#10b981' },
            { id: 'blue', bg: 'bg-blue-50', border: 'border-blue-300', text: 'text-blue-700', raw: '#3b82f6' },
            { id: 'sky', bg: 'bg-sky-50', border: 'border-sky-300', text: 'text-sky-700', raw: '#0ea5e9' },
            { id: 'amber', bg: 'bg-amber-50', border: 'border-amber-300', text: 'text-amber-700', raw: '#f59e0b' },
            { id: 'rose', bg: 'bg-rose-50', border: 'border-rose-300', text: 'text-rose-700', raw: '#f43f5e' },
            { id: 'violet', bg: 'bg-violet-50', border: 'border-violet-300', text: 'text-violet-700', raw: '#8b5cf6' }
        ];

        const WORKFLOW_PRESETS = [
            {
                name: "E-Commerce Architecture",
                description: "Multi-tier modern infrastructure indicating priority layers and custom integrations.",
                nodes: [
                    {
                        id: "node-1",
                        title: "Frontend Application",
                        description: "Customer SPA built with React and Tailwind CSS",
                        x: 80,
                        y: 150,
                        color: "blue",
                        systemTag: "Client Tier",
                        nodePriority: Priority.MEDIUM,
                        levelItems: [
                            { id: "item-1-1", name: "User Auth Portal", priority: Priority.HIGH, systemTag: "UI/UX", completed: true },
                            { id: "item-1-2", name: "Product Grid & Search", priority: Priority.MEDIUM, systemTag: "Client UI", completed: true },
                            { id: "item-1-3", name: "Stripe Shopping Cart", priority: Priority.HIGH, systemTag: "Checkout", completed: false }
                        ]
                    },
                    {
                        id: "node-2",
                        title: "API Gateway & Server",
                        description: "Node.js REST endpoint managing active routing and tokens",
                        x: 480,
                        y: 180,
                        color: "violet",
                        systemTag: "Core Server",
                        nodePriority: Priority.HIGH,
                        levelItems: [
                            { id: "item-2-1", name: "JWT Auth Validate", priority: Priority.HIGH, systemTag: "Security", completed: true },
                            { id: "item-2-2", name: "Inventory Database Sync", priority: Priority.MEDIUM, systemTag: "Core", completed: false },
                            { id: "item-2-3", name: "Cache Middleware", priority: Priority.LOW, systemTag: "Speed", completed: true }
                        ]
                    },
                    {
                        id: "node-3",
                        title: "Transaction Database",
                        description: "PostgreSQL relational instances for orders & users",
                        x: 840,
                        y: 100,
                        color: "emerald",
                        systemTag: "Data Layer",
                        nodePriority: Priority.HIGH,
                        levelItems: [
                            { id: "item-3-1", name: "Migrate orders table", priority: Priority.HIGH, systemTag: "SQL", completed: true },
                            { id: "item-3-2", name: "Index transaction fields", priority: Priority.MEDIUM, systemTag: "Ops", completed: false }
                        ]
                    },
                    {
                        id: "node-4",
                        title: "Stripe Payment Gateway",
                        description: "Integration layer handling transactions in real-time",
                        x: 840,
                        y: 380,
                        color: "amber",
                        systemTag: "External API",
                        nodePriority: Priority.MEDIUM,
                        levelItems: [
                            { id: "item-4-1", name: "Handle webhook failures", priority: Priority.HIGH, systemTag: "Finance", completed: false },
                            { id: "item-4-2", name: "Sync refunds engine", priority: Priority.MEDIUM, systemTag: "Backend", completed: true }
                        ]
                    }
                ],
                connections: [
                    {
                        id: "conn-1-2",
                        fromNodeId: "node-1",
                        toNodeId: "node-2",
                        label: "Secure API Request",
                        color: "#6366f1",
                        style: ConnectionStyle.CURVE,
                        isDashed: false
                    },
                    {
                        id: "conn-2-3",
                        fromNodeId: "node-2",
                        toNodeId: "node-3",
                        label: "Write Order/User",
                        color: "#10b981",
                        style: ConnectionStyle.ORTHOGONAL,
                        isDashed: false
                    },
                    {
                        id: "conn-2-4",
                        fromNodeId: "node-2",
                        toNodeId: "node-4",
                        label: "Process Charge",
                        color: "#f59e0b",
                        style: ConnectionStyle.STRAIGHT,
                        isDashed: true
                    }
                ]
            }
        ];

        function getColorClasses(colorId) {
            const meta = COLORS.find(c => c.id === colorId);
            return meta ? { bg: meta.bg, border: meta.border, text: meta.text } : { bg: 'bg-slate-50', border: 'border-slate-300', text: 'text-slate-850' };
        }

        // Standard Icon component for standalone package compatibility
        const Icon = ({ name, className = "w-4 h-4", ...props }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className} {...props}></i>;
        };

        // --- Active Node Editor component ---
        const ActiveNodeEditor = ({ node, onUpdate, onDelete, onClose }) => {
            const [newItemName, setNewItemName] = useState('');
            const [newItemPriority, setNewItemPriority] = useState(Priority.MEDIUM);
            const [newItemSystem, setNewItemSystem] = useState('');

            const updateField = (key, value) => {
                onUpdate({ ...node, [key]: value });
            };

            const handleAddItem = (e) => {
                e.preventDefault();
                if (!newItemName.trim()) return;

                const newItem = {
                    id: `item-${Date.now()}`,
                    name: newItemName.trim(),
                    priority: newItemPriority,
                    systemTag: newItemSystem.trim() || undefined,
                    completed: false
                };

                updateField('levelItems', [...node.levelItems, newItem]);
                setNewItemName('');
                setNewItemSystem('');
                setNewItemPriority(Priority.MEDIUM);
            };

            const handleRemoveItem = (itemId) => {
                updateField('levelItems', node.levelItems.filter(item => item.id !== itemId));
            };

            const handleToggleItemCompleted = (itemId) => {
                updateField('levelItems', node.levelItems.map(item =>
                    item.id === itemId ? { ...item, completed: !item.completed } : item
                ));
            };

            return (
                <div className="flex flex-col h-full bg-white border-l border-slate-200 w-80 lg:w-96 overflow-y-auto">
                    {/* Header */}
                    <div className="p-4 border-b border-slate-100 flex items-center justify-between sticky top-0 bg-white/95 backdrop-blur z-10">
                        <div className="flex items-center gap-2">
                            <span className="w-3.5 h-3.5 rounded-full bg-indigo-500"></span>
                            <h3 className="font-semibold text-slate-800 text-sm tracking-tight truncate">
                                Configure Workflow Box
                            </h3>
                        </div>
                        <button
                            onClick={onClose}
                            className="text-xs font-mono px-2 py-1 text-slate-400 hover:text-slate-600 border border-slate-200 rounded hover:bg-slate-50 cursor-pointer"
                        >
                            [Close]
                        </button>
                    </div>

                    <div className="p-5 flex-1 space-y-6">
                        {/* Title & Description */}
                        <div className="space-y-4">
                            <div>
                                <label className="block text-xs font-medium text-slate-500 mb-1 font-mono uppercase tracking-wider">
                                    Box Title
                                </label>
                                <input
                                    type="text"
                                    value={node.title}
                                    onChange={(e) => updateField('title', e.target.value)}
                                    className="w-full text-sm font-medium text-slate-800 border border-slate-200 rounded-lg p-2.5 focus:outline-none focus:ring-1 focus:ring-violet-500 focus:border-violet-500"
                                    placeholder="Name of this workflow step"
                                />
                            </div>

                            <div>
                                <label className="block text-xs font-medium text-slate-500 mb-1 font-mono uppercase tracking-wider">
                                    System/Level Description
                                </label>
                                <textarea
                                    value={node.description}
                                    onChange={(e) => updateField('description', e.target.value)}
                                    rows={2}
                                    className="w-full text-xs text-slate-600 border border-slate-200 rounded-lg p-2.5 focus:outline-none focus:ring-1 focus:ring-violet-500 focus:border-violet-500 resize-none"
                                    placeholder="Brief description of process or layer duties..."
                                />
                            </div>
                        </div>

                        {/* Global Node Attributes */}
                        <div className="border-t border-slate-100 pt-4 space-y-4">
                            <div className="grid grid-cols-2 gap-3">
                                <div>
                                    <label className="block text-xs font-medium text-slate-500 mb-1 font-mono uppercase tracking-wider">
                                        Overall Priority
                                    </label>
                                    <select
                                        value={node.nodePriority}
                                        onChange={(e) => updateField('nodePriority', e.target.value)}
                                        className="w-full text-xs font-medium text-slate-700 bg-white border border-slate-200 rounded-lg p-2 focus:ring-1 focus:ring-violet-500 focus:outline-none"
                                    >
                                        <option value={Priority.HIGH}>🔴 High Priority</option>
                                        <option value={Priority.MEDIUM}>🟡 Medium Priority</option>
                                        <option value={Priority.LOW}>🟢 Low Priority</option>
                                        <option value={Priority.INFO}>🔵 Info/Reference</option>
                                    </select>
                                </div>

                                <div>
                                    <label className="block text-xs font-medium text-slate-500 mb-1 font-mono uppercase tracking-wider">
                                        System Tag
                                    </label>
                                    <input
                                        type="text"
                                        value={node.systemTag || ''}
                                        onChange={(e) => updateField('systemTag', e.target.value)}
                                        className="w-full text-xs font-medium text-slate-700 border border-slate-200 rounded-lg p-2 bg-slate-50 border-dashed focus:bg-white focus:outline-none"
                                        placeholder="e.g. DB, API, Auth"
                                    />
                                </div>
                            </div>

                            {/* Color Selection Accent */}
                            <div>
                                <label className="block text-xs font-medium text-slate-500 mb-1.5 font-mono uppercase tracking-wider">
                                    Accent Color
                                </label>
                                <div className="flex items-center gap-2 flex-wrap">
                                    {COLORS.map((c) => (
                                        <button
                                            key={c.id}
                                            onClick={() => updateField('color', c.id)}
                                            className={`w-6 h-6 rounded-full border-2 transition-all cursor-pointer ${
                                                node.color === c.id
                                                    ? 'border-slate-800 scale-110 shadow-sm'
                                                    : 'border-transparent hover:scale-105'
                                            }`}
                                            style={{ backgroundColor: c.raw }}
                                        />
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* Custom levels organization */}
                        <div className="border-t border-slate-100 pt-4 space-y-3">
                            <div className="flex items-center justify-between">
                                <h4 className="text-xs font-bold font-mono text-slate-700 uppercase tracking-wider flex items-center gap-1">
                                    <Icon name="layers" className="w-3.5 h-3.5 text-slate-400" />
                                    Levels & Action Items
                                </h4>
                                <span className="text-[10px] bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded-full font-mono">
                                    {node.levelItems.length} tiers
                                </span>
                            </div>

                            {/* List of custom sub items */}
                            <div className="space-y-1.5 max-h-56 overflow-y-auto pr-1">
                                {node.levelItems.length === 0 ? (
                                    <div className="text-center p-4 border border-dashed border-slate-200 rounded-lg text-slate-400 text-xs">
                                        No nested custom layers. Add one below!
                                    </div>
                                ) : (
                                    node.levelItems.map((item) => (
                                        <div
                                            key={item.id}
                                            className={`flex items-start justify-between p-2 rounded-lg border text-xs gap-2 transition-colors ${
                                                item.completed ? 'bg-slate-50 border-slate-150 opacity-60' : 'bg-white border-slate-150 hover:border-slate-200'
                                            }`}
                                        >
                                            <button
                                                onClick={() => handleToggleItemCompleted(item.id)}
                                                className="mt-0.5 text-slate-400 hover:text-indigo-600 transition-colors shrink-0 cursor-pointer"
                                            >
                                                <Icon name={item.completed ? "check-circle" : "circle"} className={`w-4 h-4 ${item.completed ? 'text-emerald-500' : 'text-slate-400'}`} />
                                            </button>

                                            <div className="flex-1 min-w-0">
                                                <p className={`font-medium ${item.completed ? 'line-through text-slate-450' : 'text-slate-700'}`}>
                                                    {item.name}
                                                </p>
                                                <div className="flex items-center gap-1 py-1 flex-wrap">
                                                    <span className={`text-[8px] px-1 font-bold rounded ${
                                                        item.priority === Priority.HIGH ? 'bg-rose-50 text-rose-600' :
                                                        item.priority === Priority.MEDIUM ? 'bg-amber-50 text-amber-600' : 'bg-slate-100 text-slate-500'
                                                    }`}>
                                                        {item.priority}
                                                    </span>
                                                    {item.systemTag && (
                                                        <span className="text-[8px] bg-slate-100 text-slate-600 px-1 rounded flex items-center gap-0.5">
                                                            <Icon name="tag" className="w-2.5 h-2.5 text-slate-400" />
                                                            {item.systemTag}
                                                        </span>
                                                    )}
                                                </div>
                                            </div>

                                            <button
                                                onClick={() => handleRemoveItem(item.id)}
                                                className="text-slate-305 hover:text-red-500 p-1 rounded hover:bg-slate-50 shrink-0 cursor-pointer"
                                            >
                                                <Icon name="trash-2" className="w-3.5 h-3.5" />
                                            </button>
                                        </div>
                                    ))
                                )}
                            </div>

                            {/* Add Item form */}
                            <form onSubmit={handleAddItem} className="bg-slate-50 p-2.5 rounded-lg border border-slate-100 space-y-2 mt-2">
                                <input
                                    type="text"
                                    value={newItemName}
                                    onChange={(e) => setNewItemName(e.target.value)}
                                    placeholder="Add subtask or tier level..."
                                    className="w-full text-xs border border-slate-200 bg-white rounded p-1.5 focus:outline-none focus:ring-1 focus:ring-violet-500"
                                />

                                <div className="flex gap-1.5 items-center justify-between">
                                    <select
                                        value={newItemPriority}
                                        onChange={(e) => setNewItemPriority(e.target.value)}
                                        className="text-[10px] bg-white border border-slate-200 rounded p-1 focus:outline-none"
                                    >
                                        <option value={Priority.HIGH}>🔴 High</option>
                                        <option value={Priority.MEDIUM}>🟡 Medium</option>
                                        <option value={Priority.LOW}>🟢 Low</option>
                                        <option value={Priority.INFO}>🔵 Info</option>
                                    </select>

                                    <input
                                        type="text"
                                        value={newItemSystem}
                                        onChange={(e) => setNewItemSystem(e.target.value)}
                                        placeholder="Layer tag"
                                        className="w-20 text-[10px] border border-slate-200 bg-white rounded p-1 focus:outline-none"
                                    />

                                    <button
                                        type="submit"
                                        className="bg-slate-800 hover:bg-slate-900 text-white rounded p-1 flex items-center justify-center cursor-pointer"
                                    >
                                        <Icon name="plus" className="w-4 h-4" />
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>

                    {/* Delete block */}
                    <div className="p-4 border-t border-slate-100 bg-slate-50">
                        <button
                            onClick={onDelete}
                            className="text-xs text-red-600 font-semibold px-3 py-2 border border-red-200 rounded-lg bg-white hover:bg-red-50 hover:text-red-700 transition-colors flex items-center gap-1 cursor-pointer w-full justify-center"
                        >
                            <Icon name="trash-2" className="w-3.5 h-3.5" /> Delete Box Entirely
                        </button>
                    </div>
                </div>
            );
        };

        // --- Custom Workflow Help Overlay ---
        const HelpOverlay = ({ onClose }) => {
            return (
                <div className="bg-white/95 backdrop-blur border border-slate-200 shadow-xl rounded-xl p-5 max-w-sm text-slate-700 space-y-4">
                    <div className="flex items-center justify-between border-b border-slate-100 pb-2">
                        <h4 className="font-bold text-sm font-mono text-slate-800 flex items-center gap-1.5 uppercase tracking-wide">
                            <Icon name="help-circle" className="w-4 h-4 text-violet-500" />
                            Workflow Guide
                        </h4>
                        <button
                            onClick={onClose}
                            className="text-[10px] font-mono px-1.5 py-0.5 text-slate-400 hover:text-slate-600 border border-slate-200 rounded hover:bg-slate-50 cursor-pointer"
                        >
                            [Hide]
                        </button>
                    </div>

                    <div className="space-y-3.5 text-xs">
                        <div className="flex items-start gap-2.5">
                            <span className="p-1 rounded bg-violet-50 text-violet-600 mt-0.5 shrink-0"><Icon name="plus" className="w-3.5 h-3.5" /></span>
                            <div>
                                <p className="font-semibold text-slate-800">Add Box</p>
                                <p className="text-slate-500 leading-normal">
                                    Double-click anywhere on the grid canvas, or click the <span className="font-semibold text-slate-700">"+ Add Box"</span> button in the topbar.
                                </p>
                            </div>
                        </div>

                        <div className="flex items-start gap-2.5">
                            <span className="p-1 rounded bg-indigo-50 text-indigo-600 mt-0.5 shrink-0"><Icon name="move" className="w-3.5 h-3.5" /></span>
                            <div>
                                <p className="font-semibold text-slate-800">Move & Pan</p>
                                <p className="text-slate-500 leading-normal">
                                    Drag boxes by holding their header tags. Move around the infinite grid by holding and dragging the grey background.
                                </p>
                            </div>
                        </div>

                        <div className="flex items-start gap-2.5">
                            <span className="p-1 rounded bg-amber-50 text-amber-600 mt-0.5 shrink-0"><Icon name="link-2" className="w-3.5 h-3.5" /></span>
                            <div>
                                <p className="font-semibold text-slate-800">Create Arrows & Connections</p>
                                <p className="text-slate-500 leading-normal">
                                    Click <span className="font-semibold text-slate-700">"Connect"</span> on a box, then click any other box to form custom flow connection routes.
                                </p>
                            </div>
                        </div>
                    </div>

                    <div className="bg-slate-50 p-2.5 rounded-lg border border-slate-100 flex items-center gap-2 text-[10px] text-slate-500">
                        <Icon name="info" className="w-3.5 h-3.5 text-slate-400 shrink-0" />
                        <span>Hover and click on connection arrow labels to modify descriptions or delete line paths.</span>
                    </div>
                </div>
            );
        };

        // --- Main App Parent ---
        function App() {
            const [nodes, setNodes] = useState([]);
            const [connections, setConnections] = useState([]);
            const [zoom, setZoom] = useState(1.0);
            const [panX, setPanX] = useState(50);
            const [panY, setPanY] = useState(30);

            // Filters & Views state
            const [selectedNodeId, setSelectedNodeId] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [filterHighPriorityOnly, setFilterHighPriorityOnly] = useState(false);
            const [defaultConnectionStyle, setDefaultConnectionStyle] = useState(ConnectionStyle.CURVE);
            const [showHelp, setShowHelp] = useState(true);

            // Custom local save lists
            const [customSaves, setCustomSaves] = useState([]);
            const [showSaveForm, setShowSaveForm] = useState(false);
            const [saveName, setSaveName] = useState('');
            const [showLoadDropdown, setShowLoadDropdown] = useState(false);

            // Drag states
            const [draggingNodeId, setDraggingNodeId] = useState(null);
            const [dragOffset, setDragOffset] = useState({ x: 0, y: 0 });
            const [isPanning, setIsPanning] = useState(false);
            const [panStart, setPanStart] = useState({ x: 0, y: 0 });

            // Connection triggers
            const [linkingFromNodeId, setLinkingFromNodeId] = useState(null);
            const [editingConnId, setEditingConnId] = useState(null);
            const [editingConnLabel, setEditingConnLabel] = useState('');

            // Toast feedback alerts
            const [toastMessage, setToastMessage] = useState(null);

            // History management
            const [history, setHistory] = useState([]);
            const [historyIndex, setHistoryIndex] = useState(-1);

            // Setup hooks on load
            useEffect(() => {
                // Initialize widgets lucide icons
                setTimeout(() => {
                    if (window.lucide) window.lucide.createIcons();
                }, 100);

                // Load cached presets
                const cached = localStorage.getItem('streamline_cache');
                if (cached) {
                    try {
                        const parsed = JSON.parse(cached);
                        setNodes(parsed.nodes || []);
                        setConnections(parsed.connections || []);
                        setHistory([{ nodes: parsed.nodes, connections: parsed.connections }]);
                        setHistoryIndex(0);
                    } catch(e) { console.error(e); }
                } else {
                    const defaultPreset = WORKFLOW_PRESETS[0];
                    setNodes(defaultPreset.nodes);
                    setConnections(defaultPreset.connections);
                    setHistory([{ nodes: defaultPreset.nodes, connections: defaultPreset.connections }]);
                    setHistoryIndex(0);
                }

                // Custom Saves
                const s = localStorage.getItem('streamline_custom_saves');
                if (s) {
                    try { setCustomSaves(JSON.parse(s)); } catch(e){}
                }
            }, []);

            const triggerToast = (msg) => {
                setToastMessage(msg);
                setTimeout(() => {
                    setToastMessage(prev => prev === msg ? null : prev);
                }, 3500);
            };

            const pushToHistory = (nextNodes, nextConnections) => {
                const updatedHistory = history.slice(0, historyIndex + 1);
                setHistory([...updatedHistory, { nodes: nextNodes, connections: nextConnections }]);
                setHistoryIndex(updatedHistory.length);
                
                // Cache locally
                localStorage.setItem('streamline_cache', JSON.stringify({
                    nodes: nextNodes,
                    connections: nextConnections
                }));
            };

            const handleUndo = () => {
                if (historyIndex > 0) {
                    const idx = historyIndex - 1;
                    const st = history[idx];
                    setNodes(st.nodes);
                    setConnections(st.connections);
                    setHistoryIndex(idx);
                    triggerToast('Undo successful');
                }
            };

            const handleRedo = () => {
                if (historyIndex < history.length - 1) {
                    const idx = historyIndex + 1;
                    const st = history[idx];
                    setNodes(st.nodes);
                    setConnections(st.connections);
                    setHistoryIndex(idx);
                    triggerToast('Redo successful');
                }
            };

            const handleAddNode = () => {
                const rx = Math.floor(Math.random() * 200) + 120;
                const ry = Math.floor(Math.random() * 150) + 100;
                
                const newNode = {
                    id: `node-${Date.now()}`,
                    title: 'New Workflow Box',
                    description: 'Custom processes inside streamline level nodes workflows.',
                    x: rx,
                    y: ry,
                    color: 'blue',
                    systemTag: 'TIER',
                    nodePriority: Priority.MEDIUM,
                    levelItems: [
                        { id: `item-${Date.now()}`, name: 'Action level step 1', priority: Priority.MEDIUM, systemTag: 'TODO' }
                    ]
                };

                const next = [...nodes, newNode];
                setNodes(next);
                pushToHistory(next, connections);
                setSelectedNodeId(newNode.id);
                triggerToast('Added dynamic workflow box');
            };

            const handleUpdateNode = (updated) => {
                const next = nodes.map(n => n.id === updated.id ? updated : n);
                setNodes(next);
                // Direct updates to prevent lagging during panning
                localStorage.setItem('streamline_cache', JSON.stringify({ nodes: next, connections }));
            };

            const handleCommitUpdateNode = (updated) => {
                const next = nodes.map(n => n.id === updated.id ? updated : n);
                setNodes(next);
                pushToHistory(next, connections);
            };

            const handleDeleteNode = (id) => {
                const nextNodes = nodes.filter(n => n.id !== id);
                const nextConns = connections.filter(c => c.fromNodeId !== id && c.toNodeId !== id);
                setNodes(nextNodes);
                setConnections(nextConns);
                pushToHistory(nextNodes, nextConns);
                if (selectedNodeId === id) setSelectedNodeId(null);
                triggerToast('Workflow node deleted');
            };

            const handleWipe = () => {
                setNodes([]);
                setConnections([]);
                setSelectedNodeId(null);
                pushToHistory([], []);
                triggerToast('Wipe completed');
            };

            const handleSave = (name) => {
                const slot = {
                    id: `save-${Date.now()}`,
                    name: name.trim() || `My Workflow ${customSaves.length + 1}`,
                    nodes,
                    connections
                };
                const next = [slot, ...customSaves];
                setCustomSaves(next);
                localStorage.setItem('streamline_custom_saves', JSON.stringify(next));
                triggerToast(`Saved "${slot.name}" safely!`);
            };

            const handleLoadSlot = (id) => {
                const match = customSaves.find(s => s.id === id);
                if (match) {
                    setNodes(match.nodes);
                    setConnections(match.connections);
                    setSelectedNodeId(null);
                    setPanX(50);
                    setPanY(30);
                    setZoom(1.0);
                    pushToHistory(match.nodes, match.connections);
                    triggerToast(`Loaded "${match.name}"`);
                }
            };

            const handleDeleteSlot = (id) => {
                const next = customSaves.filter(s => s.id !== id);
                setCustomSaves(next);
                localStorage.setItem('streamline_custom_saves', JSON.stringify(next));
                triggerToast('Save slot removed');
            };

            const handleAddConnection = (from, to) => {
                const exists = connections.some(c => c.fromNodeId === from && c.toNodeId === to);
                if (exists) {
                    triggerToast('Link connection already drawn!');
                    return;
                }

                const newLink = {
                    id: `conn-${Date.now()}`,
                    fromNodeId: from,
                    toNodeId: to,
                    label: 'Flow link',
                    style: defaultConnectionStyle,
                    isDashed: false
                };

                const next = [...connections, newLink];
                setConnections(next);
                pushToHistory(nodes, next);
                triggerToast('Arrow connected successfully');
            };

            // Double click background handler to spawn coordinate box
            const handleBackgroundDoubleClick = (e) => {
                if (e.target.id === 'grid-pattern' || e.target.id === 'bg-svg') {
                    const rect = e.currentTarget.getBoundingClientRect();
                    const rx = (e.clientX - rect.left - panX) / zoom - 130;
                    const ry = (e.clientY - rect.top - panY) / zoom - 80;

                    const newNode = {
                        id: `node-${Date.now()}`,
                        title: 'Interactive Box',
                        description: 'Priority tasks catalogued inside steps.',
                        x: Math.round(rx),
                        y: Math.round(ry),
                        color: 'slate',
                        systemTag: 'ROUTING',
                        nodePriority: Priority.MEDIUM,
                        levelItems: []
                    };

                    const next = [...nodes, newNode];
                    setNodes(next);
                    pushToHistory(next, connections);
                    setSelectedNodeId(newNode.id);
                    triggerToast('Box created at double click coordinates!');
                }
            };

            // Background Drag handlers for Panning Workspace
            const handleMouseDown = (e) => {
                if (e.target.id === 'grid-pattern' || e.target.id === 'bg-svg') {
                    setIsPanning(true);
                    setPanStart({ x: e.clientX - panX, y: e.clientY - panY });
                    setSelectedNodeId(null);
                }
            };

            const handleMouseMove = (e) => {
                if (isPanning) {
                    setPanX(e.clientX - panStart.x);
                    setPanY(e.clientY - panStart.y);
                } else if (draggingNodeId) {
                    const node = nodes.find(n => n.id === draggingNodeId);
                    if (node) {
                        const targetX = (e.clientX - panX) / zoom - dragOffset.x;
                        const targetY = (e.clientY - panY) / zoom - dragOffset.y;
                        handleUpdateNode({
                            ...node,
                            x: Math.round(targetX),
                            y: Math.round(targetY)
                        });
                    }
                }
            };

            const handleMouseUp = () => {
                if (isPanning) setIsPanning(false);
                if (draggingNodeId) {
                    const finalNode = nodes.find(n => n.id === draggingNodeId);
                    if (finalNode) {
                        handleCommitUpdateNode(finalNode);
                    }
                    setDraggingNodeId(null);
                }
            };

            const startNodeDrag = (e, nodeId) => {
                e.stopPropagation();
                if (linkingFromNodeId) return;

                setSelectedNodeId(nodeId);
                const node = nodes.find(n => n.id === nodeId);
                if (node) {
                    const virtualMouseX = (e.clientX - panX) / zoom;
                    const virtualMouseY = (e.clientY - panY) / zoom;
                    setDragOffset({
                        x: virtualMouseX - node.x,
                        y: virtualMouseY - node.y
                    });
                    setDraggingNodeId(nodeId);
                }
            };

            const handleNodeClick = (e, nodeId) => {
                e.stopPropagation();
                if (linkingFromNodeId) {
                    if (linkingFromNodeId !== nodeId) {
                        handleAddConnection(linkingFromNodeId, nodeId);
                    }
                    setLinkingFromNodeId(null);
                } else {
                    setSelectedNodeId(nodeId);
                }
            };

            // Boundary node computations for links
            const getAttachmentPoints = (fromNode, toNode) => {
                const w = 260;
                const h = 180;
                
                const fromCenter = { x: fromNode.x + w / 2, y: fromNode.y + h / 2 };
                const toCenter = { x: toNode.x + w / 2, y: toNode.y + h / 2 };

                const dx = toCenter.x - fromCenter.x;
                const dy = toCenter.y - fromCenter.y;

                let fromX = fromCenter.x, fromY = fromCenter.y;
                let toX = toCenter.x, toY = toCenter.y;

                if (Math.abs(dx) > Math.abs(dy)) {
                    if (dx > 0) { fromX = fromNode.x + w; toX = toNode.x; }
                    else { fromX = fromNode.x; toX = toNode.x + w; }
                } else {
                    if (dy > 0) { fromY = fromNode.y + h; toY = toNode.y; }
                    else { fromY = fromNode.y; toY = toNode.y + h; }
                }

                return { fromX, fromY, toX, toY };
            };

            const getPathString = (conn) => {
                const fromNode = nodes.find(n => n.id === conn.fromNodeId);
                const toNode = nodes.find(n => n.id === conn.toNodeId);
                if (!fromNode || !toNode) return '';

                const { fromX, fromY, toX, toY } = getAttachmentPoints(fromNode, toNode);

                if (conn.style === ConnectionStyle.STRAIGHT) {
                    return `M ${fromX} ${fromY} L ${toX} ${toY}`;
                }

                if (conn.style === ConnectionStyle.ORTHOGONAL) {
                    const midX = (fromX + toX) / 2;
                    return `M ${fromX} ${fromY} L ${midX} ${fromY} L ${midX} ${toY} L ${toX} ${toY}`;
                }

                const dx = Math.abs(toX - fromX) * 0.5;
                const cpX1 = fromX + (toX > fromX ? dx : -dx);
                const cpY1 = fromY;
                const cpX2 = toX - (toX > fromX ? dx : -dx);
                const cpY2 = toY;

                return `M ${fromX} ${fromY} C ${cpX1} ${cpY1}, ${cpX2} ${cpY2}, ${toX} ${toY}`;
            };

            // Filter boxes matching search keywords
            const filteredNodes = useMemo(() => {
                return nodes.filter(node => {
                    const matchesSearch = searchTerm === '' || 
                        node.title.toLowerCase().includes(searchTerm.toLowerCase()) ||
                        node.description.toLowerCase().includes(searchTerm.toLowerCase()) ||
                        (node.systemTag && node.systemTag.toLowerCase().includes(searchTerm.toLowerCase()));

                    const matchesPriority = !filterHighPriorityOnly || 
                        node.nodePriority === Priority.HIGH || 
                        node.levelItems.some(it => it.priority === Priority.HIGH);

                    return matchesSearch && matchesPriority;
                });
            }, [nodes, searchTerm, filterHighPriorityOnly]);

            const selectedNode = nodes.find(n => n.id === selectedNodeId);

            return (
                <div className="flex flex-col h-screen text-slate-800 overflow-hidden select-none">
                    
                    {/* TOAST NOTIFICATION BANNER */}
                    {toastMessage && (
                        <div className="fixed top-4 left-1/2 -translate-x-1/2 z-50 flex items-center gap-2 px-4 py-2 bg-slate-900 border border-slate-700 text-white text-xs font-semibold rounded-xl shadow-lg animate-bounce">
                            <Icon name="sparkles" className="w-4 h-4 text-amber-400" />
                            <span>{toastMessage}</span>
                        </div>
                    )}

                    {/* TOPBAR PANEL CONTROL */}
                    <div className="bg-slate-900 text-white px-4 py-3 border-b border-slate-800 flex flex-col gap-2.5 shadow-md">
                        <div className="flex flex-wrap items-center justify-between gap-3">
                            <div className="flex items-center gap-2">
                                <span className="p-2 bg-violet-600 rounded-lg text-white font-bold text-center"><Icon name="git-branch" /></span>
                                <div>
                                    <h1 className="font-bold text-sm leading-none text-slate-100">Streamline</h1>
                                    <span className="text-[10px] text-slate-400 font-mono">STANDALONE FLOWSHEET BUILDER</span>
                                </div>
                            </div>

                            <div className="flex items-center gap-2 flex-wrap text-xs">
                                <button
                                    onClick={handleAddNode}
                                    className="bg-violet-600 hover:bg-violet-500 text-white px-3 py-1.5 rounded-lg font-medium flex items-center gap-1 cursor-pointer"
                                >
                                    <Icon name="plus" className="w-4 h-4" /> Add Box
                                </button>

                                <button
                                    onClick={() => { if(confirm('Wipe workflow canvas completely?')) handleWipe(); }}
                                    className="bg-slate-800 hover:bg-slate-700 text-slate-350 border border-slate-700 px-3 py-1.5 rounded-lg flex items-center gap-1 cursor-pointer"
                                    title="Wipe canvas contents"
                                >
                                    <Icon name="trash-2" className="w-4 h-4" /> Clear Canvas
                                </button>

                                <div className="h-5 w-px bg-slate-750 mx-1" />

                                {/* Connection type presets */}
                                <div className="flex items-center bg-slate-801 border border-slate-700 rounded-lg p-0.5">
                                    <button
                                        onClick={() => setDefaultConnectionStyle(ConnectionStyle.CURVE)}
                                        className={`px-2 py-1 rounded text-[10px] font-medium ${defaultConnectionStyle === ConnectionStyle.CURVE ? 'bg-violet-600 text-white' : 'text-slate-400'}`}
                                    >
                                        Curves
                                    </button>
                                    <button
                                        onClick={() => setDefaultConnectionStyle(ConnectionStyle.ORTHOGONAL)}
                                        className={`px-2 py-1 rounded text-[10px] font-medium ${defaultConnectionStyle === ConnectionStyle.ORTHOGONAL ? 'bg-violet-600 text-white' : 'text-slate-400'}`}
                                    >
                                        Orthogonal
                                    </button>
                                    <button
                                        onClick={() => setDefaultConnectionStyle(ConnectionStyle.STRAIGHT)}
                                        className={`px-2 py-1 rounded text-[10px] font-medium ${defaultConnectionStyle === ConnectionStyle.STRAIGHT ? 'bg-violet-600 text-white' : 'text-slate-400'}`}
                                    >
                                        Straight
                                    </button>
                                </div>

                                <div className="h-5 w-px bg-slate-755 mx-1" />

                                {/* Save Layout Trigger */}
                                <button
                                    onClick={() => { setShowSaveForm(!showSaveForm); setShowLoadDropdown(false); }}
                                    className={`px-2.5 py-1.5 rounded-lg flex items-center gap-1 cursor-pointer ${showSaveForm ? 'bg-emerald-600' : 'bg-slate-800 text-slate-300'}`}
                                >
                                    <Icon name="save" className="w-3.5 h-3.5 text-emerald-400" /> Safe-Save
                                </button>

                                {/* Load Layout Trigger */}
                                <button
                                    onClick={() => { setShowLoadDropdown(!showLoadDropdown); setShowSaveForm(false); }}
                                    className={`px-2.5 py-1.5 rounded-lg flex items-center gap-1 cursor-pointer ${showLoadDropdown ? 'bg-amber-600' : 'bg-slate-800 text-slate-300'}`}
                                >
                                    <Icon name="folder-open" className="w-3.5 h-3.5 text-amber-400" /> Safe-Load ({customSaves.length})
                                </button>

                                <div className="h-5 w-px bg-slate-750 mx-1" />

                                {/* Collapsible Help Toggle */}
                                <button
                                    onClick={() => setShowHelp(!showHelp)}
                                    className={`px-2.5 py-1.5 rounded-lg flex items-center gap-1 border border-transparent cursor-pointer ${showHelp ? 'bg-indigo-600 text-white' : 'bg-slate-800 text-slate-350'}`}
                                >
                                    <Icon name="help-circle" className="w-3.5 h-3.5 text-sky-450" /> Guide: {showHelp ? 'ON' : 'OFF'}
                                </button>
                            </div>
                        </div>

                        {/* Save workflow layout drawer panel */}
                        {showSaveForm && (
                            <div className="bg-slate-850 p-3 rounded-lg border border-emerald-500/20 flex gap-2 items-center">
                                <span className="text-xs font-mono text-emerald-400">Save Title:</span>
                                <input
                                    type="text"
                                    value={saveName}
                                    onChange={(e) => setSaveName(e.target.value)}
                                    placeholder="Enter workflow layout name..."
                                    className="flex-1 max-w-sm text-xs bg-slate-950 text-white px-2.5 py-1 rounded border border-slate-700 outline-none"
                                />
                                <button
                                    onClick={() => { handleSave(saveName); setSaveName(''); setShowSaveForm(false); }}
                                    className="bg-emerald-600 hover:bg-emerald-500 text-xs text-white font-semibold px-3 py-1 rounded cursor-pointer"
                                >
                                    Confirm Save
                                </button>
                            </div>
                        )}

                        {/* Load Layout slots grid */}
                        {showLoadDropdown && (
                            <div className="bg-slate-850 p-3 rounded-lg border border-amber-500/20 space-y-2">
                                <h4 className="text-xs font-bold text-amber-400 uppercase font-mono tracking-wider">Load Saved Flowsheets</h4>
                                {customSaves.length === 0 ? (
                                    <p className="text-xs text-slate-400 font-mono">No custom save states detected. Persist one inside the top drawer.</p>
                                ) : (
                                    <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-2">
                                        {customSaves.map(slot => (
                                            <div key={slot.id} className="flex items-center justify-between bg-slate-900 px-2.5 py-1.5 rounded border border-slate-800 text-xs">
                                                <button
                                                    onClick={() => { handleLoadSlot(slot.id); setShowLoadDropdown(false); }}
                                                    className="flex-1 text-left font-semibold text-slate-200 truncate cursor-pointer hover:text-violet-400"
                                                >
                                                    📂 {slot.name}
                                                </button>
                                                <button
                                                    onClick={() => handleDeleteSlot(slot.id)}
                                                    className="text-red-400 hover:text-red-500 p-0.5 rounded ml-1"
                                                >
                                                    <Icon name="trash-2" className="w-3.5 h-3.5" />
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Search keyword controls & scaling sliders */}
                        <div className="flex flex-wrap items-center justify-between gap-3 border-t border-slate-800/60 pt-2 text-xs text-slate-300">
                            <div className="flex items-center gap-3 flex-wrap">
                                <input
                                    type="text"
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                    placeholder="Search boxes or levels step..."
                                    className="bg-slate-800 border-none outline-none text-slate-100 px-3 py-1 rounded placeholder-slate-500 text-xs w-48 focus:ring-1 focus:ring-violet-500"
                                />
                                
                                <label className="flex items-center gap-1.5 cursor-pointer select-none">
                                    <input
                                        type="checkbox"
                                        checked={filterHighPriorityOnly}
                                        onChange={(e) => setFilterHighPriorityOnly(e.target.checked)}
                                        className="rounded border-slate-700 text-violet-600 focus:ring-opacity-40 focus:ring-violet-500"
                                    />
                                    <span className="text-slate-400 hover:text-white transition-colors">🔥 Focus High Priority Items</span>
                                </label>
                            </div>

                            {/* Zoom controls */}
                            <div className="flex items-center gap-2 bg-slate-800 px-2 py-0.5 rounded text-[11px] font-mono">
                                <span className="text-slate-400 text-[10px]">ZOOM:</span>
                                <button
                                    onClick={() => setZoom(z => Math.max(0.4, z - 0.1))}
                                    className="hover:text-white text-slate-400 font-bold px-1"
                                >
                                    -
                                </button>
                                <span className="text-slate-100 font-semibold w-10 text-center">{Math.round(zoom * 100)}%</span>
                                <button
                                    onClick={() => setZoom(z => Math.min(1.8, z + 0.1))}
                                    className="hover:text-white text-slate-400 font-bold px-1"
                                >
                                    +
                                </button>
                                <button
                                    onClick={() => { setZoom(1.0); setPanX(50); setPanY(30); }}
                                    className="text-[9px] text-slate-400 hover:text-slate-100 bg-slate-750 px-1.5 rounded ml-1"
                                >
                                    FIT
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* CANVAS WORKSPACE AREA CONTAINER */}
                    <div className="flex-1 flex overflow-hidden relative">
                        <div className="flex-1 flex flex-col overflow-hidden relative">
                            {/* Floating control */}
                            <div className="absolute top-4 right-4 z-10 flex gap-1.5 items-center bg-white/90 backdrop-blur-md p-1.5 rounded-lg border border-slate-200 shadow-sm text-xs font-mono">
                                <button
                                    onClick={handleUndo}
                                    disabled={historyIndex <= 0}
                                    className="p-1 px-2 hover:bg-slate-100 disabled:opacity-30 rounded text-slate-600 hover:text-slate-900 cursor-pointer flex items-center gap-1"
                                >
                                    <Icon name="undo-2" className="w-3.5 h-3.5" /> Undo
                                </button>
                                <div className="w-px h-4 bg-slate-200" />
                                <button
                                    onClick={handleRedo}
                                    disabled={historyIndex >= history.length - 1}
                                    className="p-1 px-2 hover:bg-slate-100 disabled:opacity-30 rounded text-slate-600 hover:text-slate-900 cursor-pointer flex items-center gap-1"
                                >
                                    <Icon name="redo-2" className="w-3.5 h-3.5" /> Redo
                                </button>
                            </div>

                            {/* INTERACTIVE VECTOR GRAPH LAYER */}
                            <div
                                id="grid-pattern"
                                onMouseDown={handleMouseDown}
                                onMouseMove={handleMouseMove}
                                onMouseUp={handleMouseUp}
                                onDoubleClick={handleBackgroundDoubleClick}
                                className="flex-1 relative overflow-hidden bg-slate-50 cursor-grab active:cursor-grabbing"
                            >
                                <div
                                    style={{
                                        transform: `translate(${panX}px, ${panY}px) scale(${zoom})`,
                                        transformOrigin: '0 0',
                                        width: '4000px',
                                        height: '4000px'
                                    }}
                                    className="absolute inset-0 pointer-events-none"
                                >
                                    {/* SVG background grid and connections */}
                                    <svg id="bg-svg" className="absolute inset-0 w-full h-full pointer-events-auto">
                                        <defs>
                                            <pattern id="grid-dots" width="40" height="40" patternUnits="userSpaceOnUse">
                                                <circle cx="2" cy="2" r="1.2" fill="#d1d5db" />
                                            </pattern>
                                        </defs>
                                        <rect id="bg-rect" width="100%" height="100%" fill="url(#grid-dots)" />

                                        {/* DRAW STATIC PATH LINKS */}
                                        {connections.map(conn => {
                                            const pathStr = getPathString(conn);
                                            if (!pathStr) return null;

                                            const isRelated = selectedNodeId === conn.fromNodeId || selectedNodeId === conn.toNodeId;
                                            const strokeColor = isRelated ? '#8b5cf6' : '#64748b';
                                            const strokeWidth = isRelated ? 2.5 : 1.75;

                                            const from = nodes.find(n => n.id === conn.fromNodeId);
                                            const to = nodes.find(n => n.id === conn.toNodeId);
                                            let labelX = 0, labelY = 0;
                                            if (from && to) {
                                                const pts = getAttachmentPoints(from, to);
                                                labelX = (pts.fromX + pts.toX) / 2;
                                                labelY = (pts.fromY + pts.toY) / 2;
                                            }

                                            return (
                                                <g key={conn.id}>
                                                    <path
                                                        d={pathStr}
                                                        fill="none"
                                                        stroke={strokeColor}
                                                        strokeWidth={strokeWidth}
                                                    />

                                                    {labelX > 0 && (
                                                        <foreignObject x={labelX - 45} y={labelY - 14} width="90" height="30" className="overflow-visible">
                                                            <div className="flex justify-center items-center h-full gap-1">
                                                                <button
                                                                    onClick={() => {
                                                                        const txt = prompt('Enter flow link description:', conn.label || '');
                                                                        if (txt !== null) {
                                                                            const updated = connections.map(c => c.id === conn.id ? { ...c, label: txt } : c);
                                                                            setConnections(updated);
                                                                            pushToHistory(nodes, updated);
                                                                        }
                                                                    }}
                                                                    className="px-1.5 py-0.5 rounded bg-white text-[9px] text-slate-600 border border-slate-205 shadow-sm font-semibold hover:bg-slate-100 hover:text-slate-800"
                                                                >
                                                                    {conn.label || 'Link'}
                                                                </button>
                                                                <button
                                                                    onClick={() => {
                                                                        const next = connections.filter(c => c.id !== conn.id);
                                                                        setConnections(next);
                                                                        pushToHistory(nodes, next);
                                                                    }}
                                                                    className="bg-white border rounded text-slate-400 hover:text-red-500"
                                                                >
                                                                    <Icon name="x" className="w-2.5 h-2.5" />
                                                                </button>
                                                            </div>
                                                        </foreignObject>
                                                    )}
                                                </g>
                                            );
                                        })}
                                    </svg>

                                    {/* FLOWSHEET BOX NODES CONTAINER */}
                                    <div className="absolute inset-0 pointer-events-none">
                                        {filteredNodes.map(node => {
                                            const isSelected = node.id === selectedNodeId;
                                            const colorClasses = getColorClasses(node.color);

                                            return (
                                                <div
                                                    key={node.id}
                                                    style={{
                                                        position: 'absolute',
                                                        left: `${node.x}px`,
                                                        top: `${node.y}px`,
                                                        width: '260px',
                                                    }}
                                                    onClick={(e) => handleNodeClick(e, node.id)}
                                                    className={`pointer-events-auto rounded-xl bg-white shadow-md border hover:shadow-lg transition-all flex flex-col ${
                                                        isSelected ? 'ring-2 ring-violet-500 border-violet-500 shadow-xl scale-102' : 'border-slate-250'
                                                    }`}
                                                >
                                                    {/* Node Header */}
                                                    <div
                                                        onMouseDown={(e) => startNodeDrag(e, node.id)}
                                                        className={`p-2 rounded-t-xl flex items-center justify-between border-b cursor-move ${colorClasses.bg} ${colorClasses.border}`}
                                                    >
                                                        <div className="flex items-center gap-1 min-w-0">
                                                            <Icon name="move" className="w-3 h-3 text-slate-400 shrink-0" />
                                                            {node.systemTag ? (
                                                                <span className="text-[9px] font-bold font-mono px-1.5 py-0.2 rounded bg-white/70 text-slate-700 min-w-0 truncate">
                                                                    {node.systemTag}
                                                                </span>
                                                            ) : (
                                                                <span className="text-[9px] text-slate-400 font-mono">Streamline Box</span>
                                                            )}
                                                        </div>
                                                        <span className="text-[8px] font-bold px-1.5 rounded-full bg-slate-100 text-slate-700">{node.nodePriority}</span>
                                                    </div>

                                                    {/* Node content body */}
                                                    <div className="p-3.5 flex-1 flex flex-col gap-1.5">
                                                        <h3 className="font-bold text-slate-800 text-xs truncate leading-none">
                                                            {node.title || 'Untitled box'}
                                                        </h3>
                                                        <p className="text-[10px] text-slate-500 leading-normal line-clamp-2">
                                                            {node.description || 'Double click to configure...'}
                                                        </p>

                                                        {node.levelItems.length > 0 && <div className="h-px bg-slate-100 my-1" />}

                                                        {/* Sub workflow priority items inside boxes */}
                                                        <div className="space-y-1">
                                                            {node.levelItems.slice(0, 3).map((item) => (
                                                                <div key={item.id} className="flex items-center justify-between text-[10px] text-slate-650">
                                                                    <div className="flex items-center gap-1 min-w-0">
                                                                        <span className={`w-1.5 h-1.5 rounded-full ${item.completed ? 'bg-emerald-500' : 'bg-slate-300'}`} />
                                                                        <span className={`truncate ${item.completed ? 'line-through text-slate-400' : 'text-slate-700 font-medium'}`}>{item.name}</span>
                                                                    </div>
                                                                    <span className="text-[8px] px-1 font-mono rounded bg-slate-50 text-slate-500 text-right">{item.priority}</span>
                                                                </div>
                                                            ))}
                                                            {node.levelItems.length > 3 && (
                                                                <div className="text-[9px] text-violet-500 text-right font-semibold">+ {node.levelItems.length - 3} more layers</div>
                                                            )}
                                                        </div>
                                                    </div>

                                                    {/* Node quick action links drawer */}
                                                    <div className="px-3 py-1.5 bg-slate-50 border-t border-slate-100 rounded-b-xl flex justify-between items-center text-[10px]">
                                                        <button
                                                            onClick={(e) => { e.stopPropagation(); handleDeleteNode(node.id); }}
                                                            className="text-slate-400 hover:text-red-500 transition-colors pointer-events-auto"
                                                        >
                                                            <Icon name="trash-2" className="w-3.5 h-3.5" />
                                                        </button>

                                                        <button
                                                            onClick={(e) => {
                                                                e.stopPropagation();
                                                                if (linkingFromNodeId === node.id) {
                                                                    setLinkingFromNodeId(null);
                                                                } else {
                                                                    setLinkingFromNodeId(node.id);
                                                                    setSelectedNodeId(node.id);
                                                                }
                                                            }}
                                                            className={`px-2 py-0.5 rounded border text-[9px] pointer-events-auto flex items-center gap-1 ${
                                                                linkingFromNodeId === node.id ? 'bg-amber-400 text-slate-900 border-amber-500 animate-pulse font-bold' : 'bg-white hover:bg-slate-100 border-slate-200'
                                                            }`}
                                                            title="Draw arrow to other node"
                                                        >
                                                            <Icon name="link-2" className="w-3 h-3 text-violet-500" />
                                                            {linkingFromNodeId === node.id ? 'Linking...' : 'Connect'}
                                                        </button>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>

                            {/* Standard layout guides floating overlay */}
                            {showHelp && (
                                <div className="absolute bottom-4 left-4 z-10">
                                    <HelpOverlay onClose={() => setShowHelp(false)} />
                                </div>
                            )}
                        </div>

                        {/* Node metadata configurations inspector panel layout selection */}
                        {selectedNode && (
                            <ActiveNodeEditor
                                node={selectedNode}
                                onUpdate={handleUpdateNode}
                                onDelete={() => handleDeleteNode(selectedNode.id)}
                                onClose={() => setSelectedNodeId(null)}
                            />
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
